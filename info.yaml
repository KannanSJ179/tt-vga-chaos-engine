# Tiny Tapeout project information
project:
  title:        "V-SPACE- Tiny tapeout CORDIC ENGINE"
  author:       "Atharva Verma"
  discord:      "" 
  description:  "16-iteration CORDIC hardware accelerator for fixed-point Sin/Cos computation."
  language:     "Verilog" 
  clock_hz:     10000000 

  # How many tiles your design occupies?
  tiles: "1x1" 

  # Your top module name must start with "tt_um_". 
  top_module:  "tt_um_cordic_engine"

  # List your project's source files here.
  source_files:
    - "cordic_core_stage.v"
    - "cordic_fsm.v"
    - "cordic_engine.v"
    - "tt_um_cordic_engine.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "theta_in[0] (LSB)"
  ui[1]: "theta_in[1]"
  ui[2]: "theta_in[2]"
  ui[3]: "theta_in[3]"
  ui[4]: "theta_in[4]"
  ui[5]: "theta_in[5]"
  ui[6]: "theta_in[6]"
  ui[7]: "theta_in[7] (MSB)"

  # Outputs
  uo[0]: "muxed_out[0] (LSB)"
  uo[1]: "muxed_out[1]"
  uo[2]: "muxed_out[2]"
  uo[3]: "muxed_out[3]"
  uo[4]: "muxed_out[4]"
  uo[5]: "muxed_out[5]"
  uo[6]: "muxed_out[6]"
  uo[7]: "muxed_out[7] (MSB) - Q1.7 Format"

  # Bidirectional pins
  uio[0]: "Input: start (Pulse high to begin)"
  uio[1]: "Input: out_sel (0 = Sine, 1 = Cosine)"
  uio[2]: "Output: valid (High when complete)"
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
