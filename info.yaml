# SPDX-License-Identifier: Apache-2.0
# TinyTapeout project configuration

project:
  title: "SNN AFib Detector"
  author: "sanjay"
  description: "10-neuron spiking neural network for real-time atrial fibrillation detection from RR intervals"
  language: "Verilog"
  clock_hz: 10000000  # 10 MHz

  # Source files (relative to src/)
  source_files:
    - tt_um_snn_afib_detector.v
    - rr_features.v
    - spike_encoder.v
    - reservoir.v
    - readout.v
    - lif_neuron.v

  # Top-level module
  top_module: "tt_um_snn_afib_detector"

# Pin definitions
pinout:
  ui_in:
    - r_peak          # ECG R-peak pulse input
    - w_load          # Weight load enable
    - w_data          # Serial weight data
    - w_clk           # Weight shift clock
    - unused_4
    - unused_5
    - unused_6
    - unused_7

  uo_out:
    - afib_flag       # 1 = atrial fibrillation detected
    - out_valid       # 1 = classification result ready
    - any_spike       # Reservoir activity monitor
    - fsm_state_0     # FSM state bit 0
    - fsm_state_1     # FSM state bit 1
    - confidence_0    # Confidence level bit 0
    - confidence_1    # Confidence level bit 1
    - confidence_2    # Confidence level bit 2

  uio_in:
    - unused
    - unused
    - unused
    - unused
    - unused
    - unused
    - unused
    - unused

  uio_out:
    - unused
    - unused
    - unused
    - unused
    - unused
    - unused
    - unused
    - unused
